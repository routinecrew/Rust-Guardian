# Rust-Guardian 기본 설정
# 핫 리로드 지원 — 파일 변경 시 자동 반영

capture:
  source: file
  path: "input.jpg"
  width: 640
  height: 480
  fps: 10

detector:
  model_path: "models/yunet.onnx"
  backend: "ort"
  input_width: 320
  input_height: 320
  confidence_threshold: 0.5
  nms_threshold: 0.4
  target_labels:
    - face
    - license_plate
  # quantization:
  #   level: "auto"
  #   calibration_data: "./calibration/"
  #   max_mAP50_loss: 0.05
  #   max_recall_loss: 0.03

masker:
  level: 1  # 1=GaussianBlur, 2=Mosaic, 3=SolidBox, 4=Synthetic, 5=Removal
  # level 4 사용 시: legal_review_required: true

# signer:
#   enabled: true
#   device_id: "guardian-device-001"
#   key_path: "/var/lib/rust-guardian/keys/"
#   chain_state_path: "/var/lib/rust-guardian/chain_state.bin"

output:
  sinks:
    - sink_type: file
      path: "output/"

